<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIT2079 Data Visualization 2 - Solar Energy Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>

  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Urbanist', sans-serif;
      background-color: #f4f7f6;
      margin: 0;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      background-color: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      margin-bottom: 40px;
      width: fit-content;
    }

    h1 {
      color: #2c3e50;
      margin-bottom: 10px;
    }

    p.description {
      color: #7f8c8d;
      max-width: 800px;
      text-align: center;
      margin-bottom: 40px;
    }

    /* Đảm bảo biểu đồ không bị tràn */
    .vis-container {
      width: 100%;
    }
  </style>
</head>

<body>

  <h1>Australian Solar Energy Adoption Analysis</h1>
  <p class="description">
    This dashboard explores the distribution and growth of residential solar PV installations across Australia, 
    highlighting regional performance and national trends.
  </p>

  <div class="container">
    <div id="vis1" class="vis-container"></div>
  </div>

  <div class="container">
    <div id="vis2" class="vis-container"></div>
  </div>

<script type="text/javascript">
    var spec1 = "json/Australian_Residential_Solar_PV_Adoption_Map.vg.json";
    vegaEmbed('#vis1', spec1).then(function(result) {
    }).catch(console.error);

    var spec2 = "json/Top_15_solar_install.vg.json";
    vegaEmbed('#vis2', spec2).then(function(result) {
    }).catch(console.error);
  </script>

</body>

</html>
